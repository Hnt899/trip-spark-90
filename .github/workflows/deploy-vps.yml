name: Deploy VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          script: |
            set -eu
            APP_DIR="/opt/trip-spark-90"
            REPO_URL="https://github.com/Hnt899/trip-spark-90"

            if [ ! -d "${APP_DIR}/.git" ]; then
              mkdir -p /opt
              git clone "${REPO_URL}" "${APP_DIR}"
            fi

            cd "${APP_DIR}"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            if [ ! -f ".env.vps" ]; then
              echo "Missing ${APP_DIR}/.env.vps. Create it manually on server first."
              exit 1
            fi

            docker compose --env-file .env.vps up -d --build --remove-orphans
            docker image prune -f
